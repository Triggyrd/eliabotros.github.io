<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>triggyrd</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Barlow+Semi+Condensed:wght@300;400;500&family=Special+Elite&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  :root{
    --bg:#0a0b0c;--ash:#e6e3dc;--ash-bright:#f4f1ea;--muted:#a39e94;--faint:#5c574e;
    --rust:#a85e44;--ember:#c8794f;
    --line:rgba(230,227,220,.13);
    --serif:'Cormorant Garamond',serif;--sans:'Barlow Semi Condensed',sans-serif;--type:'Special Elite',monospace;
  }
  html,body{height:100%;}
  body{background:var(--bg);color:var(--ash);font-family:var(--sans);font-weight:400;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 18px;position:relative;overflow-x:hidden;}

  /* atmosphere */
  #ash{position:fixed;inset:0;z-index:0;pointer-events:none;}
  .fog{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
  .fog span{position:absolute;width:150vw;height:150vw;border-radius:50%;filter:blur(10px);}
  .fog .f1{top:-60vw;left:-30vw;background:radial-gradient(circle,rgba(150,150,150,.05),transparent 62%);animation:d1 50s ease-in-out infinite alternate;}
  .fog .f2{bottom:-60vw;right:-30vw;background:radial-gradient(circle,rgba(168,94,68,.06),transparent 60%);animation:d2 64s ease-in-out infinite alternate;}
  @keyframes d1{to{transform:translate(12vw,8vh) scale(1.15);}}
  @keyframes d2{to{transform:translate(-12vw,-8vh) scale(1.12);}}
  body::before{content:"";position:fixed;inset:0;z-index:9990;pointer-events:none;opacity:.05;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:150px 150px;animation:grain .6s steps(2) infinite;}
  @keyframes grain{to{transform:translate(-6px,4px);}}
  body::after{content:"";position:fixed;inset:0;z-index:9989;pointer-events:none;background:radial-gradient(ellipse at center,transparent 38%,rgba(0,0,0,.7) 100%);}

  /* ====== CLICK TO ENTER overlay ====== */
  .enter{position:fixed;inset:0;z-index:9995;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:radial-gradient(ellipse at center,rgba(14,15,16,.96),rgba(6,7,8,.99));text-align:center;cursor:pointer;
    transition:opacity 1.1s ease,visibility 1.1s ease;}
  .enter.gone{opacity:0;visibility:hidden;pointer-events:none;}
  .enter .halo{width:62px;height:62px;margin-bottom:30px;opacity:.85;animation:haloflick 5s infinite;}
  @keyframes haloflick{0%,93%,100%{opacity:.85;}94%{opacity:.3;}95%{opacity:.7;}96%{opacity:.25;}97%{opacity:.8;}}
  .enter .et{font-family:var(--serif);font-size:clamp(2rem,7vw,3.2rem);font-weight:400;letter-spacing:.14em;color:var(--ash-bright);text-transform:uppercase;animation:etflick 4s 1s infinite;}
  @keyframes etflick{0%,90%,100%{opacity:1;text-shadow:0 0 18px rgba(200,121,79,.25);}92%{opacity:.55;}94%{opacity:.9;}96%{opacity:.5;}}
  .enter .es{font-family:var(--type);font-size:.66rem;letter-spacing:.4em;text-transform:uppercase;color:var(--muted);margin-top:20px;animation:pulse 2.6s infinite;}

  /* flashlight cursor */
  .torch{position:fixed;top:0;left:0;z-index:10001;pointer-events:none;opacity:0;transform:translate(-50%,-50%);transition:opacity .3s ease;will-change:transform;}
  .torch .glow{position:absolute;left:50%;top:50%;width:200px;height:200px;transform:translate(-50%,-50%);border-radius:50%;background:radial-gradient(circle,rgba(200,160,110,.13) 0%,rgba(200,160,110,0) 65%);mix-blend-mode:screen;}
  .torch .pt{position:absolute;left:50%;top:50%;width:22px;height:22px;transform:translate(-50%,-50%);}
  .torch.hot .ring{stroke:var(--ember);}
  @media(pointer:fine){*{cursor:none !important;}}

  /* card */
  .card{position:relative;z-index:2;width:100%;max-width:400px;padding:40px 30px 30px;text-align:center;
    background:rgba(16,17,19,.55);border:1px solid var(--line);border-radius:18px;
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    box-shadow:0 30px 80px rgba(0,0,0,.6);transform-style:preserve-3d;transition:transform .15s ease;}

  .avatar{width:112px;height:112px;border-radius:50%;margin:0 auto 18px;border:1px solid var(--rust);overflow:hidden;position:relative;box-shadow:0 0 26px rgba(168,94,68,.25);background:url('avatar.JPG') center/cover no-repeat;}
  .avatar svg{display:none;}
  .avatar::after{content:"";position:absolute;inset:0;background:radial-gradient(circle at 50% 35%,transparent 40%,rgba(10,11,12,.55) 100%);}

  .name{font-family:var(--serif);font-size:2.3rem;font-weight:500;color:var(--ash-bright);letter-spacing:.04em;line-height:1;animation:flick 6s 1.5s infinite;}
  @keyframes flick{0%,95%,100%{opacity:1;}96%{opacity:.6;}97%{opacity:.9;}98%{opacity:.55;}99%{opacity:.95;}}
  .alias{font-family:var(--type);font-size:.62rem;letter-spacing:.26em;text-transform:uppercase;color:var(--muted);margin-top:10px;}
  .alias .c{color:var(--ember);}
  .status{display:inline-flex;align-items:center;gap:7px;font-family:var(--type);font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-top:14px;}
  .status .dot{width:7px;height:7px;border-radius:50%;background:#6f9c5e;box-shadow:0 0 7px #6f9c5e;animation:pulse 2.4s infinite;}
  @keyframes pulse{50%{opacity:.4;}}
  .bio{font-size:.98rem;color:var(--ash);margin:16px auto 4px;max-width:30ch;line-height:1.6;}

  .rule{width:46px;height:1px;background:var(--rust);margin:22px auto;}

  /* social icons */
  .socials{display:flex;flex-wrap:wrap;justify-content:center;gap:12px;margin-bottom:24px;}
  .soc{width:44px;height:44px;display:flex;align-items:center;justify-content:center;border:1px solid var(--line);border-radius:11px;color:var(--muted);text-decoration:none;transition:transform .2s,border-color .25s,color .25s,background .25s;background:rgba(0,0,0,.2);}
  .soc:hover{transform:translateY(-4px);border-color:var(--rust);color:var(--ember);background:rgba(168,94,68,.08);}
  .soc svg{width:21px;height:21px;}

  /* ====== custom music player ====== */
  .player{margin-top:6px;border:1px solid var(--line);border-radius:13px;background:rgba(0,0,0,.32);padding:13px 14px;text-align:left;}
  .np-top{display:flex;align-items:center;gap:13px;}
  .cover{position:relative;width:54px;height:54px;flex:0 0 54px;border-radius:9px;overflow:hidden;border:1px solid var(--line);background:#17181a;padding:0;cursor:pointer;}
  .cover img{width:100%;height:100%;object-fit:cover;display:block;}
  .cover .pp-ico{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(8,9,10,.42);color:var(--ash-bright);font-size:1rem;transition:background .25s,opacity .25s;}
  .cover:hover .pp-ico{background:rgba(8,9,10,.6);}
  .np-meta{flex:1;min-width:0;}
  .np-title{font-family:var(--serif);font-size:1.18rem;color:var(--ash-bright);line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .np-artist{font-family:var(--type);font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .np-bar{position:relative;height:5px;border-radius:3px;background:rgba(230,227,220,.12);margin:14px 0 7px;cursor:pointer;}
  .np-fill{position:absolute;left:0;top:0;bottom:0;width:0;border-radius:3px;background:linear-gradient(90deg,var(--rust),var(--ember));}
  .np-fill::after{content:"";position:absolute;right:-4px;top:50%;transform:translateY(-50%);width:9px;height:9px;border-radius:50%;background:var(--ember);box-shadow:0 0 7px rgba(200,121,79,.7);}
  .np-times{display:flex;justify-content:space-between;font-family:var(--type);font-size:.56rem;letter-spacing:.1em;color:var(--muted);}
  .np-vol{display:flex;align-items:center;gap:8px;margin-top:11px;}
  .np-vol span{font-family:var(--type);font-size:.6rem;color:var(--faint);}
  .np-vol input{flex:1;-webkit-appearance:none;appearance:none;height:3px;border-radius:2px;background:rgba(230,227,220,.14);outline:none;}
  .np-vol input::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;border-radius:50%;background:var(--ember);cursor:pointer;}
  .np-vol input::-moz-range-thumb{width:11px;height:11px;border:none;border-radius:50%;background:var(--ember);cursor:pointer;}

  .foot{margin-top:22px;font-family:var(--type);font-size:.56rem;letter-spacing:.18em;text-transform:uppercase;color:var(--faint);text-align:center;}
  .back{display:block;margin-top:10px;font-family:var(--type);font-size:.56rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color .3s;text-align:center;}
  .back:hover{color:var(--ember);}

  a:focus-visible,.cover:focus-visible{outline:1px solid var(--ember);outline-offset:3px;}
  @media(prefers-reduced-motion:reduce){.card,.name,body::before,.fog span,.enter .halo,.enter .et{animation:none !important;}}
</style>
</head>
<body>

  <!-- ====== MUSIC PLAYER ======
       song.mp3  = your audio file (already uploaded)
       cover.jpg = album cover image (upload one next to this file).
       Edit the title/artist text below if you change the song. -->
  <div class="player">
    <div class="np-top">
      <button class="cover" id="pp" aria-label="Play or pause">
        <img src="cover.jpg" alt="" onerror="this.style.display='none'">
        <span class="pp-ico" id="ppico">&#9654;</span>
      </button>
      <div class="np-meta">
        <div class="np-title">Please Love Me... Once More</div>
        <div class="np-artist">Akira Yamaoka · Silent Hill</div>
      </div>
    </div>
    <div class="np-bar" id="bar"><div class="np-fill" id="fill"></div></div>
    <div class="np-times"><span id="cur">0:00</span><span id="dur">0:00</span></div>
    <div class="np-vol"><span>VOL</span><input id="vol" type="range" min="0" max="1" step="0.01" value="0.2" aria-label="Volume"></div>
    <audio id="bgm" loop preload="metadata" src="song.mp3"></audio>
  </div>

  <div class="foot">Inspired by Silent Hill</div>
  <a class="back" href="index.html">&larr; back to site</a>

</main>

<script>
  // ===== music player =====
  (function(){
    var a=document.getElementById('bgm'),pp=document.getElementById('pp'),ico=document.getElementById('ppico'),
        bar=document.getElementById('bar'),fill=document.getElementById('fill'),
        cur=document.getElementById('cur'),dur=document.getElementById('dur'),vol=document.getElementById('vol');
    a.volume=0.2;
    function fmt(t){if(isNaN(t)||!isFinite(t))return'0:00';var m=Math.floor(t/60),s=Math.floor(t%60);return m+':'+(s<10?'0'+s:s);}
    a.addEventListener('loadedmetadata',function(){dur.textContent=fmt(a.duration);});
    a.addEventListener('timeupdate',function(){
      cur.textContent=fmt(a.currentTime);
      if(a.duration){fill.style.width=(a.currentTime/a.duration*100)+'%';}
    });
    function setIco(){ico.innerHTML=a.paused?'&#9654;':'&#10074;&#10074;';}
    pp.addEventListener('click',function(e){e.stopPropagation();if(a.paused)a.play();else a.pause();setIco();});
    a.addEventListener('play',setIco);a.addEventListener('pause',setIco);
    bar.addEventListener('click',function(e){var r=bar.getBoundingClientRect();a.currentTime=((e.clientX-r.left)/r.width)*a.duration;});
    vol.addEventListener('input',function(){a.volume=parseFloat(vol.value);});
    // expose play for the enter overlay
    window.__startMusic=function(){a.play().then(setIco).catch(function(){});};
  })();

  // ===== click to enter =====
  (function(){
    var e=document.getElementById('enter');
    function enter(){e.classList.add('gone');if(window.__startMusic)window.__startMusic();
      e.removeEventListener('click',enter);window.removeEventListener('keydown',key);}
    function key(ev){if(ev.key==='Enter'||ev.key===' '){enter();}}
    e.addEventListener('click',enter);window.addEventListener('keydown',key);
  })();

  // ===== ash particles =====
  (function(){
    var c=document.getElementById('ash'),x=c.getContext('2d'),w,h,p=[];
    var reduce=window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    function size(){w=c.width=innerWidth;h=c.height=innerHeight;}
    size();window.addEventListener('resize',size);
    for(var i=0;i<70;i++)p.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.6+.4,s:Math.random()*.4+.15,d:Math.random()*Math.PI*2});
    function frame(){
      x.clearRect(0,0,w,h);
      for(var i=0;i<p.length;i++){var o=p[i];o.y+=o.s;o.x+=Math.sin(o.d+o.y*.01)*.3;if(o.y>h){o.y=-5;o.x=Math.random()*w;}
        x.beginPath();x.arc(o.x,o.y,o.r,0,7);x.fillStyle='rgba(200,190,175,'+(o.r*0.18)+')';x.fill();}
      requestAnimationFrame(frame);
    }
    if(!reduce) frame();
  })();

  // ===== card tilt =====
  (function(){
    var card=document.getElementById('card');
    if(!window.matchMedia||!window.matchMedia('(pointer:fine)').matches) return;
    window.addEventListener('mousemove',function(e){
      var rx=(e.clientY/innerHeight-.5)*-6, ry=(e.clientX/innerWidth-.5)*6;
      card.style.transform='perspective(900px) rotateX('+rx+'deg) rotateY('+ry+'deg)';
    });
  })();

  // ===== flashlight cursor =====
  (function(){
    if(!window.matchMedia||!window.matchMedia('(pointer:fine)').matches) return;
    var t=document.getElementById('torch');
    var reduce=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    var tx=0,ty=0,cx=0,cy=0,shown=false;
    window.addEventListener('mousemove',function(ev){tx=ev.clientX;ty=ev.clientY;if(!shown){shown=true;t.style.opacity=1;cx=tx;cy=ty;}});
    window.addEventListener('mouseout',function(ev){if(!ev.relatedTarget){t.style.opacity=0;shown=false;}});
    function loop(){var e=reduce?1:.2;cx+=(tx-cx)*e;cy+=(ty-cy)*e;t.style.transform='translate('+cx+'px,'+cy+'px) translate(-50%,-50%)';requestAnimationFrame(loop);}
    requestAnimationFrame(loop);
    document.querySelectorAll('a,.soc,.cover,.np-bar').forEach(function(el){
      el.addEventListener('mouseenter',function(){t.classList.add('hot');});
      el.addEventListener('mouseleave',function(){t.classList.remove('hot');});
    });
  })();
</script>
</body>
